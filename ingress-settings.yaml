controller:
  replicaCount: 2
  config:
    keep-alive: "60"
    keep-alive-requests: "600000"
    upstream-keepalive-timeout: "4"
    upstream-keepalive-requests: "600000"
  startupProbe:
    httpGet:
      path: "/healthz"
      port: 10254
      scheme: HTTP
    periodSeconds: 1
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 60
  livenessProbe:
    initialDelaySeconds: 0
  readinessProbe:
    initialDelaySeconds: 0
  containerSecurityContext:
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE
    runAsUser: 101
    runAsGroup: 101
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
