apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  labels:
    app: envoy
spec:
  replicas: 2
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      volumes:
      - name: config
        configMap:
          name: envoy
      containers:
      - name: helper
        image: alpine:3.22.2
        command:
        - /bin/sh
        - -c
        - >
          trap 'echo "Starting graceful shutdown..." && 
                wget -q -O - --tries=1 --timeout=2 --post-data="" http://127.0.0.1:9901/drain_listeners?graceful >/dev/null 2>&1 ||
                true; exit 0' TERM INT; 
          while :; do sleep 5; done
      - name: envoy
        image: envoyproxy/envoy:distroless-v1.36.2
        args:
        - -c
        - /config/config.yaml
        - --drain-time-s
        - '10'
        - --drain-strategy
        - gradual
        volumeMounts:
        - name: config
          mountPath: "/config"
        lifecycle:
          preStop:
            sleep:
              # Sleep for 15 seconds to both allow the helper container to send drain signal
              # and for Envoy to complete draining for the '--drain-time-s' period, as well
              # as any kube-proxy or ingress gateway client to stop initiating new connections.
              seconds: 15
        startupProbe:
          successThreshold: 1
          failureThreshold: 30
          periodSeconds: 1
          timeoutSeconds: 1
          httpGet:
            path: /ready
            port: 9901
        readinessProbe:
          successThreshold: 1
          failureThreshold: 2
          periodSeconds: 3
          timeoutSeconds: 1
          httpGet:
            path: /ready
            port: 9901
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
        ports:
        - name: http
          containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
spec:
  selector:
    app: envoy
  ports:
  - protocol: TCP
    port: 80
    targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: envoy
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: envoy
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: envoy
spec:
  ingressClassName: nginx
  rules:
  - host: envoy
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: envoy
            port:
              number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy
data:
  config.yaml: |
    # file: config.yaml
    admin:
      profile_path: /tmp/envoy.prof
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
    static_resources:
      listeners:
      - name: listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8080
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: inbound
              drain_timeout: 5s
              delayed_close_timeout: 1s
              common_http_protocol_options:
                idle_timeout: 60s
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                  log_format:
                    text_format_source:
                      inline_string: >
                        [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL% %UPSTREAM_PROTOCOL%"
                        %RESPONSE_CODE% %RESPONSE_FLAGS% %RESPONSE_CODE_DETAILS% %CONNECTION_TERMINATION_DETAILS%
                        "%UPSTREAM_TRANSPORT_FAILURE_REASON%" %BYTES_RECEIVED% %BYTES_SENT% %DURATION%
                        %RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)% "%REQ(X-FORWARDED-FOR)%" "%REQ(USER-AGENT)%"
                        "%REQ(X-REQUEST-ID)%" "%REQ(:AUTHORITY)%" "%UPSTREAM_HOST%" %UPSTREAM_CLUSTER_RAW%
                        %UPSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_REMOTE_ADDRESS%
                        %REQUESTED_SERVER_NAME% %ROUTE_NAME%\n'
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              route_config:
                name: local_route
                virtual_hosts:
                - name: java_demo
                  domains: ["*"]
                  #retry_policy:
                  #  retry_on: refused-stream
                  #  num_retries: 3
                  routes:
                  - match:
                      prefix: "/java-demo/"
                      query_parameters:
                      - name: h2
                        present_match: true
                      - name: dns
                        present_match: true
                    route:
                      cluster: java_demo_80_h2_dns
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/java-demo/"
                      query_parameters:
                      - name: h2
                        present_match: true
                    route:
                      cluster: java_demo_80_h2
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/java-demo/"
                    route:
                      cluster: java_demo_80_h1
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/nginx/"
                      query_parameters:
                      - name: h2
                        present_match: true
                    route:
                      cluster: nginx_80_h2
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/nginx/"
                    route:
                      cluster: nginx_80_h1
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/varnish/"
                      query_parameters:
                      - name: h2
                        present_match: true
                    route:
                      cluster: varnish_80_h2
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/varnish/"
                    route:
                      cluster: varnish_80_h1
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/node-demo/"
                    route:
                      cluster: node_demo_80_h1
                      prefix_rewrite: "/"
                  - match:
                      prefix: "/go-demo/"
                    route:
                      cluster: go_demo_80_h1
                      prefix_rewrite: "/"
      clusters:
      - name: nginx_80_h1
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http_protocol_options: {}
        load_assignment:
          cluster_name: nginx_80_h1
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: nginx
                    port_value: 80
      - name: nginx_80_h2
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http2_protocol_options:
                max_concurrent_streams: 100
        load_assignment:
          cluster_name: nginx_80_h2
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: nginx
                    port_value: 80
      - name: varnish_80_h1
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http_protocol_options: {}
        load_assignment:
          cluster_name: varnish_80_h1
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: varnish
                    port_value: 80
      - name: varnish_80_h2
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http2_protocol_options:
                max_concurrent_streams: 100
        load_assignment:
          cluster_name: varnish_80_h2
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: varnish
                    port_value: 80
      - name: java_demo_80_h1
        #circuit_breakers:
        #  thresholds:
        #  - max_connections: 4294967295
        #    max_pending_requests: 4294967295
        #    max_requests: 4294967295
        #    max_retries: 4294967295
        #    track_remaining: true
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http_protocol_options: {}
        load_assignment:
          cluster_name: java_demo_80_h1
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: java-demo
                    port_value: 80
      - name: java_demo_80_h2
        #circuit_breakers:
        #  thresholds:
        #  - max_connections: 4294967295
        #    max_pending_requests: 4294967295
        #    max_requests: 4294967295
        #    max_retries: 4294967295
        #    track_remaining: true
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http2_protocol_options:
                max_concurrent_streams: 100
        load_assignment:
          cluster_name: java_demo_80_h2
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: java-demo
                    port_value: 80
      - name: java_demo_80_h2_dns
        type: STRICT_DNS
        #circuit_breakers:
        #  thresholds:
        #  - max_connections: 4294967295
        #    max_pending_requests: 4294967295
        #    max_requests: 4294967295
        #    max_retries: 4294967295
        #    track_remaining: true
        dns_refresh_rate: 3s
        dns_jitter: 0.300s
        respect_dns_ttl: false
        dns_lookup_family: V4_ONLY
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http2_protocol_options:
                max_concurrent_streams: 100
        load_assignment:
          cluster_name: java_demo_80_h2_dns
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: java-demo-headless
                    port_value: 8080
      - name: node_demo_80_h1
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http_protocol_options: {}
        load_assignment:
          cluster_name: node_demo_80_h1
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: node-demo
                        port_value: 80
      - name: go_demo_80_h1
        type: STRICT_DNS
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            common_http_protocol_options:
              idle_timeout: 4s
            explicit_http_config:
              http_protocol_options: {}
        load_assignment:
          cluster_name: go_demo_80_h1
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: go-demo
                        port_value: 80
